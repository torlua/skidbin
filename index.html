<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBXShare</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0d0d0d;
        color: #e6e6e6;
    }

    /* Sidebar */
    .sidebar {
        position: fixed;
        width: 220px;
        height: 100%;
        background: #111;
        padding-top: 20px;
        border-right: 1px solid #222;
    }

    .sidebar h2 {
        text-align: center;
        color: #fff;
        margin-bottom: 20px;
    }

    .sidebar a {
        display: block;
        padding: 12px 20px;
        color: #ccc;
        text-decoration: none;
        transition: 0.2s;
    }

    .sidebar a:hover {
        background: #1a1a1a;
        color: #fff;
    }

    /* Main Content */
    .main {
        margin-left: 220px;
        padding: 20px;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .topbar input {
        padding: 8px;
        background: #111;
        border: 1px solid #333;
        color: #fff;
        width: 250px;
    }

    .btn {
        background: #1f1f1f;
        border: 1px solid #333;
        padding: 8px 14px;
        color: #fff;
        cursor: pointer;
    }

    .btn:hover {
        background: #2a2a2a;
    }

    /* File Cards */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
    }

    .card {
        background: #111;
        padding: 15px;
        border: 1px solid #222;
        border-radius: 6px;
        transition: 0.2s;
    }

    .card:hover {
        border-color: #444;
    }

    .card h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
    }

    .card p {
        font-size: 12px;
        color: #aaa;
    }

    .upload-box {
        margin-top: 20px;
        background: #111;
        padding: 15px;
        border: 1px solid #222;
    }

    textarea {
        width: 100%;
        height: 150px;
        background: #0d0d0d;
        border: 1px solid #333;
        color: #fff;
        padding: 10px;
        resize: none;
    }
</style>
</head>
<body>

<div class="sidebar">
    <h2>RBXShare</h2>
    <a href="#">Dashboard</a>
    <a href="#">My Files</a>
    <a href="#">Upload</a>
    <a href="#">Settings</a>
</div>

<div class="main">
    <div class="topbar">
        <input type="text" placeholder="Search scripts...">
        <button class="btn">New Upload</button>
    </div>

    <div class="grid" id="fileGrid">
        <div class="card">
            <h3>Gun System.lua</h3>
            <p>Uploaded by user123</p>
        </div>
        <div class="card">
            <h3>Radio Script.lua</h3>
            <p>Uploaded by devguy</p>
        </div>
    </div>

    <div class="upload-box">
        <h3>Upload Roblox Script</h3>
        <input type="text" id="title" placeholder="Script Name" style="width:100%; margin-bottom:10px; padding:8px; background:#0d0d0d; border:1px solid #333; color:#fff;">
        <textarea id="code" placeholder="Paste your Lua code here..."></textarea>
        <button class="btn" onclick="uploadScript()">Upload</button>
    </div>
</div>

<script>
function uploadScript() {
    const title = document.getElementById('title').value;
    const grid = document.getElementById('fileGrid');

    if (!title) return alert('Enter a title');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${title}</h3><p>Uploaded just now</p>`;

    grid.prepend(card);
}
</script>

</body>
</html>
